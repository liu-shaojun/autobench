  # #   # 可选：这一模型单独裁剪测试矩阵（例：不跑 65536）
  # #   # tests:
  # #   #   perf:
  # #   #     input_len: [6144]
  # #   #     concurrency: [1, 2, 4, 6, 8, 10, 12, 16, 24, 32]
  # #   #     output_len: [1024]

  - name: Qwen3.6-27B
    ze_affinity_mask: "4,5,6,7"             # 设置 container 内 GPU 可见
    # model_path: /custom/absolute/path     # 可选：覆盖默认 {container_model_dir}/{name}
    server:
      args:
        tensor-parallel-size: 4
        max-model-len: 70000
        max-num-batched-tokens: 8192
        quantization: fp8

